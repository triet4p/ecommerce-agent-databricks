bundle:
  name: ecommerce-agent

sync:
  include:
    - .build/apps/**
  exclude:
    - .agents/**
    - .pytest_cache/**
    - .ruff_cache/**
    - .venv/**
    - artifacts/**
    - docs/**
    - scripts/**
    - tests/**

variables:
  app_name:
    description: Singleton Databricks App name shared by the deployment targets.
    default: ecommerce-agent-app
  llm_endpoint_name:
    # AgentServer requires Responses API passthrough. The previously configured
    # Foundation endpoint rejects it; use the existing DeepSeek singleton.
    default: deepseek-v4-streaming-agent-lab
  reranker_endpoint_name:
    default: search-and-rerank-endpoint
  lakebase_branch:
    default: projects/ecommerce-agent-conversations/branches/production
  lakebase_database:
    default: projects/ecommerce-agent-conversations/branches/production/databases/databricks-postgres
  chat_ui_source:
    description: >-
      Chat UI source path.  Defaults to the React app
      (.build/apps/chat_ui).  Override to .build/apps/streamlit_chat_ui
      for the Streamlit demo fallback.
    default: .build/apps/chat_ui

resources:
  experiments:
    ecommerce_agent_app:
      # MLflow does not create intermediate workspace folders during bundle
      # deployment; /Shared is present in the target workspace.
      name: /Shared/ecommerce-agent-app

  apps:
    ecommerce_agent:
      # This is an App, not an Agent Model Serving endpoint. The two custom
      # endpoints remain externally managed singleton dependencies.
      name: ${var.app_name}
      description: MLflow ResponsesAgent e-commerce support application.
      source_code_path: .build/apps/agent_app
      resources:
        - name: llm-endpoint
          serving_endpoint:
            name: ${var.llm_endpoint_name}
            permission: CAN_QUERY
        - name: policy-reranker
          serving_endpoint:
            name: ${var.reranker_endpoint_name}
            permission: CAN_QUERY
        - name: agent-experiment
          experiment:
            experiment_id: ${resources.experiments.ecommerce_agent_app.id}
            permission: CAN_EDIT
        - name: get-order-status
          uc_securable:
            securable_full_name: ecommerce_agent.agent_layer.get_order_status
            securable_type: FUNCTION
            permission: EXECUTE
        - name: get-customer-order-history
          uc_securable:
            securable_full_name: ecommerce_agent.agent_layer.get_customer_order_history
            securable_type: FUNCTION
            permission: EXECUTE
        - name: get-seller-performance
          uc_securable:
            securable_full_name: ecommerce_agent.agent_layer.get_seller_performance
            securable_type: FUNCTION
            permission: EXECUTE
        - name: get-shipping-delay-stats
          uc_securable:
            securable_full_name: ecommerce_agent.agent_layer.get_shipping_delay_stats
            securable_type: FUNCTION
            permission: EXECUTE
        - name: check-refund-eligibility
          uc_securable:
            securable_full_name: ecommerce_agent.agent_layer.check_refund_eligibility
            securable_type: FUNCTION
            permission: EXECUTE

    ecommerce_agent_chat_ui:
      name: ecommerce-agent-chat-ui
      description: >-
        Chat UI with Lakebase-backed conversation persistence.
        Default source is React (.build/apps/chat_ui).  Set
        var.chat_ui_source to .build/apps/streamlit_chat_ui for the
        Streamlit demo fallback.
      source_code_path: ${var.chat_ui_source}
      resources:
        - name: agent-app
          app:
            name: ${resources.apps.ecommerce_agent.name}
            permission: CAN_USE
        - name: conversation-store
          postgres:
            branch: ${var.lakebase_branch}
            database: ${var.lakebase_database}
            permission: CAN_CONNECT_AND_CREATE

    ecommerce_agent_mcp_facade:
      name: ecommerce-agent-mcp-facade
      description: Streamable HTTP MCP facade that invokes the agent App through OAuth.
      source_code_path: .build/apps/mcp_facade
      resources:
        - name: agent-app
          app:
            name: ${resources.apps.ecommerce_agent.name}
            permission: CAN_USE

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
