use_case: ecommerce_support

# Local dev fallback / giá trị dùng để seed Prompt Registry (xem register_prompt.py).
# Khi system_prompt_registry_uri có giá trị, nó THẮNG — dòng system_prompt dưới đây
# chỉ còn tác dụng lúc chạy register_prompt.py hoặc test local không có MLflow.
system_prompt: |
  Bạn là trợ lý hỗ trợ khách hàng cho một sàn thương mại điện tử tại Brazil.
  Luôn kiểm tra dữ kiện qua tool trước khi trả lời (đơn hàng, chính sách, hoàn tiền).
  Trước khi trả lời tình huống phức tạp, cân nhắc gọi list_skills() để xem có hướng
  dẫn chuyên biệt nào áp dụng cho tình huống này không.

# Bỏ comment sau khi chạy register_prompt.py (cú pháp alias dùng "@", không phải "/"):
# system_prompt_registry_uri: prompts:/ecommerce_demo.agent.ecommerce_support_system_prompt@production

llm:
  endpoint_name: databricks-meta-llama-3-3-70b-instruct
  temperature: 0.0
  max_tokens: 1500

tools:
  # --- SQL UC Functions (đọc gold.order_summary) ---
  - kind: uc_function
    full_name: ecommerce_demo.agent.get_order_status
  - kind: uc_function
    full_name: ecommerce_demo.agent.get_customer_order_history
  - kind: uc_function
    full_name: ecommerce_demo.agent.get_seller_performance
  - kind: uc_function
    full_name: ecommerce_demo.agent.get_shipping_delay_stats

  # --- Python UC Functions (tính toán nhẹ) ---
  - kind: uc_function
    full_name: ecommerce_demo.agent.check_refund_eligibility
  - kind: uc_function
    full_name: ecommerce_demo.agent.compute_delay_severity
  - kind: uc_function
    full_name: ecommerce_demo.agent.customer_value_score

  # --- Tool nặng: rerank qua Model Serving endpoint riêng ---
  - kind: serving_endpoint
    name: search_policy_docs
    endpoint_name: search-and-rerank-endpoint
    description: >
      Tìm kiếm trong các tài liệu chính sách (return, shipping, LGPD, seller conduct)
      để trả lời câu hỏi về quy định. Trả về các đoạn văn bản liên quan kèm nguồn.

retriever:
  endpoint_name: search-and-rerank-endpoint
  over_fetch_k: 20
  top_k: 5

# Rules — luôn nạp vào system prompt lúc build agent, giữ danh sách này ngắn.
rules:
  paths:
    - projects/ecommerce_support/rules/no-assume-customer-claims.md
    - projects/ecommerce_support/rules/tone-and-language.md

# Skills — progressive disclosure, agent tự gọi list_skills() / load_skill(name).
# volume_path trỏ tới UC Volume chứa các file .md; khi deploy, sync
# projects/ecommerce_support/skills/*.md lên volume này (xem driver.py).
skills:
  volume_path: /Volumes/ecommerce_demo/agent/skills
